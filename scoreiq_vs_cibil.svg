<svg width="100%" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#08080f"/><stop offset="100%" stop-color="#120830"/>
  </linearGradient>
  <style>
    @keyframes fadein { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideL { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
    @keyframes slideR { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
    @keyframes barL { from{width:0} to{width:var(--w)} }
    @keyframes redpulse { 0%,100%{fill:#dc3c3c;opacity:0.7} 50%{fill:#ff5555;opacity:1} }
    @keyframes greenpulse { 0%,100%{fill:#22d38a;opacity:0.8} 50%{fill:#33ffaa;opacity:1} }
    @keyframes strike { from{width:0} to{width:100%} }

    .cibil-side { animation: slideL 0.7s 0.2s both; opacity:0; }
    .scoreiq-side { animation: slideR 0.7s 0.2s both; opacity:0; }
    .r1 { animation: fadein 0.5s 0.5s both; opacity:0; }
    .r2 { animation: fadein 0.5s 0.7s both; opacity:0; }
    .r3 { animation: fadein 0.5s 0.9s both; opacity:0; }
    .r4 { animation: fadein 0.5s 1.1s both; opacity:0; }
    .r5 { animation: fadein 0.5s 1.3s both; opacity:0; }
    .r6 { animation: fadein 0.5s 1.5s both; opacity:0; }
    .verdict { animation: fadein 0.8s 2s both; opacity:0; }
    .xmark { animation: redpulse 2s 1.8s infinite; }
    .checkmark { animation: greenpulse 2s 1.8s infinite; }
  </style>
</defs>

<rect width="900" height="360" fill="url(#bg)" rx="12"/>

<!-- Grid -->
<g opacity="0.03" stroke="#a060ff" stroke-width="0.5">
  <line x1="0" y1="72" x2="900" y2="72"/><line x1="0" y1="144" x2="900" y2="144"/>
  <line x1="0" y1="216" x2="900" y2="216"/><line x1="0" y1="288" x2="900" y2="288"/>
  <line x1="300" y1="0" x2="300" y2="360"/><line x1="600" y1="0" x2="600" y2="360"/>
</g>

<!-- Title -->
<text x="450" y="30" font-family="monospace" font-size="12" fill="#3a2a5a" text-anchor="middle" letter-spacing="3">CIBIL vs SCOREIQ</text>

<!-- CIBIL header -->
<g class="cibil-side">
  <rect x="30" y="42" width="260" height="46" rx="8" fill="#2a0808" stroke="#dc3c3c" stroke-width="1"/>
  <text x="160" y="60" font-family="monospace" font-size="16" font-weight="900" fill="#dc3c3c" text-anchor="middle">CIBIL</text>
  <text x="160" y="78" font-family="monospace" font-size="10" fill="#6a3a3a" text-anchor="middle">Traditional bureau scoring</text>
</g>

<!-- ScoreIQ header -->
<g class="scoreiq-side">
  <rect x="610" y="42" width="260" height="46" rx="8" fill="#0a1a20" stroke="#22d38a" stroke-width="1.5"/>
  <text x="740" y="60" font-family="monospace" font-size="16" font-weight="900" fill="#22d38a" text-anchor="middle">ScoreIQ</text>
  <text x="740" y="78" font-family="monospace" font-size="10" fill="#2a5a4a" text-anchor="middle">AI-powered alternative scoring</text>
</g>

<!-- Center divider -->
<line x1="450" y1="42" x2="450" y2="318" stroke="#2a1a4a" stroke-width="1" stroke-dasharray="4 4"/>
<text x="450" y="170" font-family="monospace" font-size="10" fill="#3a2a5a" text-anchor="middle" transform="rotate(-90,450,170)">VS</text>

<!-- Row labels (center) -->
<g>
  <text x="450" y="122" font-family="monospace" font-size="10" fill="#4a3a6a" text-anchor="middle">Data source</text>
  <text x="450" y="162" font-family="monospace" font-size="10" fill="#4a3a6a" text-anchor="middle">Gig workers</text>
  <text x="450" y="202" font-family="monospace" font-size="10" fill="#4a3a6a" text-anchor="middle">Fresh graduates</text>
  <text x="450" y="242" font-family="monospace" font-size="10" fill="#4a3a6a" text-anchor="middle">Explainable?</text>
  <text x="450" y="282" font-family="monospace" font-size="10" fill="#4a3a6a" text-anchor="middle">Improvement tips</text>
</g>

<!-- CIBIL values -->
<g class="r1"><text x="295" y="122" font-family="monospace" font-size="11" fill="#dc3c3c" text-anchor="end">Loan history only</text></g>
<g class="r2"><text x="295" y="162" font-family="monospace" font-size="11" fill="#dc3c3c" text-anchor="end">No score — invisible</text></g>
<g class="r3"><text x="295" y="202" font-family="monospace" font-size="11" fill="#dc3c3c" text-anchor="end">No score — invisible</text></g>
<g class="r4"><text x="295" y="242" font-family="monospace" font-size="11" fill="#dc3c3c" text-anchor="end">Black box</text></g>
<g class="r5"><text x="295" y="282" font-family="monospace" font-size="11" fill="#dc3c3c" text-anchor="end">None provided</text></g>

<!-- ScoreIQ values -->
<g class="r1"><text x="605" y="122" font-family="monospace" font-size="11" fill="#22d38a">Income, assets, debt, behaviour</text></g>
<g class="r2"><text x="605" y="162" font-family="monospace" font-size="11" fill="#22d38a">Scored on cash flow</text></g>
<g class="r3"><text x="605" y="202" font-family="monospace" font-size="11" fill="#22d38a">Scored on savings + job stability</text></g>
<g class="r4"><text x="605" y="242" font-family="monospace" font-size="11" fill="#22d38a">Full factor breakdown</text></g>
<g class="r5"><text x="605" y="282" font-family="monospace" font-size="11" fill="#22d38a">5 specific action steps</text></g>

<!-- Row separators -->
<g stroke="#1a0a30" stroke-width="1">
  <line x1="30" y1="132" x2="870" y2="132"/>
  <line x1="30" y1="172" x2="870" y2="172"/>
  <line x1="30" y1="212" x2="870" y2="212"/>
  <line x1="30" y1="252" x2="870" y2="252"/>
  <line x1="30" y1="292" x2="870" y2="292"/>
</g>

<!-- Verdict -->
<g class="verdict">
  <rect x="150" y="308" width="600" height="36" rx="8" fill="#0a1a10" stroke="#22d38a" stroke-width="1.5"/>
  <text x="450" y="330" font-family="monospace" font-size="13" font-weight="900" fill="#22d38a" text-anchor="middle">CIBIL sees your past  •  ScoreIQ sees your future</text>
</g>
</svg>
