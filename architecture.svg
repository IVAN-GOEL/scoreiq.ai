<svg width="100%" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08080f"/><stop offset="100%" stop-color="#120830"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#a060ff" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <style>
      @keyframes fadein { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
      @keyframes flowdash { to{stroke-dashoffset:-24} }
      @keyframes glow { 0%,100%{filter:drop-shadow(0 0 4px #a060ff88)} 50%{filter:drop-shadow(0 0 10px #a060ffcc)} }
      @keyframes ping { 0%{r:6;opacity:1} 100%{r:18;opacity:0} }

      .n1{animation:fadein .6s .1s both}
      .n2{animation:fadein .6s .3s both}
      .n3{animation:fadein .6s .5s both}
      .n4{animation:fadein .6s .7s both}
      .n5{animation:fadein .6s .9s both}
      .n6{animation:fadein .6s 1.1s both}
      .center-node{animation:glow 2.5s ease-in-out infinite}
      .fl{stroke-dasharray:6 4;animation:flowdash 1s linear infinite}
      .ping{animation:ping 1.8s ease-out infinite}
    </style>
  </defs>

  <rect width="900" height="320" fill="url(#bg2)" rx="12"/>

  <!-- Section label -->
  <text x="450" y="30" font-family="monospace" font-size="13" fill="#4a3a6a" text-anchor="middle">ARCHITECTURE</text>
  <line x1="50" y1="38" x2="380" y2="38" stroke="#2a1a4a" stroke-width="1"/>
  <line x1="520" y1="38" x2="850" y2="38" stroke="#2a1a4a" stroke-width="1"/>

  <!-- INPUT NODES (left column) -->
  <g class="n1">
    <rect x="30" y="58" width="155" height="44" rx="8" fill="#12083a" stroke="#5a2a9a" stroke-width="1"/>
    <text x="112" y="76" font-family="monospace" font-size="11" fill="#a060ff" text-anchor="middle">User Form</text>
    <text x="112" y="92" font-family="monospace" font-size="10" fill="#5a4a7a" text-anchor="middle">name, income, assets</text>
  </g>
  <g class="n2">
    <rect x="30" y="118" width="155" height="44" rx="8" fill="#12083a" stroke="#5a2a9a" stroke-width="1"/>
    <text x="112" y="136" font-family="monospace" font-size="11" fill="#a060ff" text-anchor="middle">Bank PDF</text>
    <text x="112" y="152" font-family="monospace" font-size="10" fill="#5a4a7a" text-anchor="middle">statement parser</text>
  </g>
  <g class="n3">
    <rect x="30" y="178" width="155" height="44" rx="8" fill="#12083a" stroke="#5a2a9a" stroke-width="1"/>
    <text x="112" y="196" font-family="monospace" font-size="11" fill="#a060ff" text-anchor="middle">Setu AA</text>
    <text x="112" y="212" font-family="monospace" font-size="10" fill="#5a4a7a" text-anchor="middle">live bank consent</text>
  </g>
  <g class="n4">
    <rect x="30" y="238" width="155" height="44" rx="8" fill="#12083a" stroke="#5a2a9a" stroke-width="1"/>
    <text x="112" y="256" font-family="monospace" font-size="11" fill="#a060ff" text-anchor="middle">Assets + Liabilities</text>
    <text x="112" y="272" font-family="monospace" font-size="10" fill="#5a4a7a" text-anchor="middle">declared by user</text>
  </g>

  <!-- Animated flow lines left → center -->
  <line class="fl" x1="186" y1="80" x2="330" y2="158" stroke="#7c3cdc" stroke-width="1.2" marker-end="url(#arr)"/>
  <line class="fl" x1="186" y1="140" x2="330" y2="163" stroke="#7c3cdc" stroke-width="1.2" marker-end="url(#arr)"/>
  <line class="fl" x1="186" y1="200" x2="330" y2="168" stroke="#7c3cdc" stroke-width="1.2" marker-end="url(#arr)"/>
  <line class="fl" x1="186" y1="260" x2="330" y2="173" stroke="#7c3cdc" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- CENTER: AI Engine -->
  <g class="center-node n5">
    <rect x="320" y="118" width="180" height="84" rx="12" fill="#1e0848" stroke="#a060ff" stroke-width="1.5"/>
    <circle class="ping" cx="410" cy="112" r="6" fill="none" stroke="#a060ff" stroke-width="1"/>
    <circle cx="410" cy="112" r="6" fill="#a060ff"/>
    <text x="410" y="148" font-family="monospace" font-size="13" font-weight="900" fill="#f0ebff" text-anchor="middle">AI Engine</text>
    <text x="410" y="165" font-family="monospace" font-size="10" fill="#8a6aaa" text-anchor="middle">FastAPI + Railway</text>
    <text x="410" y="180" font-family="monospace" font-size="10" fill="#8a6aaa" text-anchor="middle">RandomForest + SHAP</text>
  </g>

  <!-- Animated flow lines center → right -->
  <line class="fl" x1="502" y1="155" x2="640" y2="90" stroke="#22d38a" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="6 4"/>
  <line class="fl" x1="502" y1="165" x2="640" y2="165" stroke="#22d38a" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="6 4"/>
  <line class="fl" x1="502" y1="175" x2="640" y2="240" stroke="#22d38a" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="6 4"/>

  <!-- OUTPUT NODES (right column) -->
  <g class="n5">
    <rect x="640" y="58" width="220" height="55" rx="8" fill="#0a1a20" stroke="#22d38a" stroke-width="1"/>
    <text x="750" y="80" font-family="monospace" font-size="13" font-weight="900" fill="#22d38a" text-anchor="middle">Credit Score</text>
    <text x="750" y="98" font-family="monospace" font-size="11" fill="#2a6a4a" text-anchor="middle">300 – 850 range</text>
  </g>
  <g class="n6">
    <rect x="640" y="135" width="220" height="55" rx="8" fill="#12083a" stroke="#a060ff" stroke-width="1"/>
    <text x="750" y="157" font-family="monospace" font-size="11" fill="#c090ff" text-anchor="middle">Risk Band + Explanation</text>
    <text x="750" y="174" font-family="monospace" font-size="10" fill="#5a4a7a" text-anchor="middle">plain English reasoning</text>
  </g>
  <g class="n6">
    <rect x="640" y="210" width="220" height="55" rx="8" fill="#12083a" stroke="#a060ff" stroke-width="1"/>
    <text x="750" y="232" font-family="monospace" font-size="11" fill="#c090ff" text-anchor="middle">5 Improvement Tips</text>
    <text x="750" y="249" font-family="monospace" font-size="10" fill="#5a4a7a" text-anchor="middle">specific, actionable steps</text>
  </g>

  <!-- Bottom labels -->
  <text x="112" y="302" font-family="monospace" font-size="10" fill="#3a2a5a" text-anchor="middle">INPUTS</text>
  <text x="410" y="302" font-family="monospace" font-size="10" fill="#3a2a5a" text-anchor="middle">PROCESSING</text>
  <text x="750" y="302" font-family="monospace" font-size="10" fill="#3a2a5a" text-anchor="middle">OUTPUT</text>

  <!-- Bottom strip -->
  <rect x="0" y="308" width="900" height="12" fill="#0e0520" rx="0"/>
</svg>
